input {
    kb_layout = us, ara
    kb_options = grp:alt_shift_toggle,grp_win_space_toggle

    follow_mouse = 1
    
    touchpad {
        natural_scroll = true,
	    scroll_factor = 0.5
    }
}

# Trackpad gestures
gesture = 3, horizontal, workspace
# gesture = 2, pinchin, fullscreen
# gesture = 2, pinchout, float

device {
    name = glorious-model-o
    sensitivity = -0.75
}

cursor {
    no_hardware_cursors = false
}

xwayland {
  force_zero_scaling = true
}

