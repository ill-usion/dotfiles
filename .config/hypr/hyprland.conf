# Ignore maximize requests from apps. You'll probably like this.
# windowrule = suppress_event maximize, class:.*
windowrule = match:class .*, suppress_event maximize
# Fix some dragging issues with XWayland
# windowrule = no_focus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
windowrule = match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0, no_focus on

# Floating windows
windowrule = match:class kitty, float on
windowrule = match:class kitty, center on
windowrule = match:class pavucontrol, float on
windowrule = match:class blueman-manager, float on
windowrule = match:class nm-connection-editor, float on
windowrule = match:title Easy\ Effects, float on:w
windowrule = match:title Easy\ Effects, size 600 500
windowrule = match:title Picture\ in\ picture, opacity 1 1 1

# Layer rules
layerrule = match:namespace wofi, blur on
layerrule = match:namespace waybar, blur on
layerrule = match:namespace hyprpicker, no_anim on
layerrule = match:namespace selection, no_anim on
layerrule = match:namespace swaync-control-center, animation windows

# Workspaces
workspace = 1, monitor:eDP-1
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1

workspace = 5, monitor:DP-1
workspace = 6, monitor:DP-1
workspace = 7, monitor:DP-1
workspace = 8, monitor:DP-1
workspace = 9, monitor:DP-1
workspace = 0, monitor:DP-1
