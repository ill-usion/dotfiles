general {
    gaps_in = 5
    gaps_out = 10

    border_size = 2

    col.active_border = rgba(ffffff1a)
    col.inactive_border = rgba(88888800)
    
    resize_on_border = true

    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 5
    rounding_power = 2

    active_opacity = 1
    inactive_opacity = 0.7

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        noise = 0
        brightness = 1
        vibrancy = 0.5
    }
}

# animations {
#     enabled = yes, please :)
# 
#     bezier = easeOutQuint,0.23,1,0.32,1
#     bezier = easeInOutCubic,0.65,0.05,0.36,1
#     bezier = linear,0,0,1,1
#     bezier = almostLinear,0.5,0.5,0.75,1.0
#     bezier = quick,0.15,0,0.1,1
# 
#     animation = global, 1, 10, default
#     animation = border, 1, 5.39, easeOutQuint
#     animation = windows, 1, 4.79, easeOutQuint
#     animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
#     animation = windowsOut, 1, 1.49, linear, popin 87%
#     animation = fadeIn, 1, 1.73, almostLinear
#     animation = fadeOut, 1, 1.46, almostLinear
#     animation = fade, 1, 3.03, quick
#     animation = layers, 1, 3.81, easeOutQuint
#     animation = layersIn, 1, 4, easeOutQuint, fade
#     animation = layersOut, 1, 1.5, linear, fade
#     animation = fadeLayersIn, 1, 1.79, almostLinear
#     animation = fadeLayersOut, 1, 1.39, almostLinear
#     animation = workspaces, 1, 1.94, almostLinear, fade
#     animation = workspacesIn, 1, 1.21, almostLinear, fade
#     animation = workspacesOut, 1, 1.94, almostLinear, fade
# }
animations {
    enabled = true

    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92 
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = fluent_decel, 0.1, 1, 0, 1
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeInExpo, 0.95, 0.05, 0.8, 0.04
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = easeInOut, 0.77, 0, 0.18, 1
    bezier = easeInOutBounce, 0.68, -0.55, 0.27, 1.55

    animation = windows, 1, 3, md3_decel, popin 33%
    animation = windowsMove, 1, 4, hyprnostretch
    animation = layersIn, 1, 0.5, easeInExpo, fade 
    animation = layersOut, 1, 1, easeOutCirc, popin 60%
    animation = border, 1, 10, default
    animation = fade, 1, 2.5, md3_decel
    animation = workspaces, 1, 3.5, easeOutExpo, slidefade 33%
    animation = monitorAdded, 1, 3, md3_decel
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

